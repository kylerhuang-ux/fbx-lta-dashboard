// Suspicious: rider home postal district vs offence postal (first 2 digits)
function isSuspicious(n) {
  if (!n.postal || !n.offencePostal) return false;
  const homeDist = parseInt(n.postal.substring(0,2));
  const offDist  = parseInt(n.offencePostal.substring(0,2));
  return Math.abs(homeDist - offDist) >= 10;
}

const LTA_FIELDS = [
  { label:"Notice Number",              key:"noticeNo"    },
  { label:"Vehicle / Device Number",    key:"vehicleNo"   },
  { label:"Offence Date (DD/MM/YYYY)",  key:"offenceDate" },
  { label:"Rider's Full Name",          key:"riderName"   },
  { label:"Full NRIC / Passport / FIN", key:"nric"        },
  { label:"Date of Birth (DD/MM/YYYY)", key:"dob"         },
  { label:"Gender",                     key:"gender"      },
  { label:"Block / House Number",       key:"block"       },
  { label:"Street Name",                key:"street"      },
  { label:"Floor Number",               key:"floor"       },
  { label:"Unit Number",                key:"unit"        },
  { label:"Postal Code",                key:"postal"      },
  { label:"Rider's Mobile Number",      key:"contact"     },
  { label:"Rider's Email (optional)",   key:null          },
];

function toTSV(n) {
  return LTA_FIELDS.map(f => f.key ? (n[f.key] || "") : "").join("\t");
}

function daysUntil(ds) {
  if (!ds) return null;
  const [d,m,y] = ds.split("/");
  return Math.ceil((new Date(`${y}-${m}-${d}`) - new Date()) / 86400000);
}

// ─── DETAIL PANEL — bottom sheet modal ────────────────────────────────────────
function DetailPanel({ n, onClose, onColZSave }) {
  const ec = ENTITY_CFG[n.entity];
  const sc = STATUS_CFG[n.status];
  const [colZ, setColZ] = useState(n.colZ || "");
  const [saved, setSaved] = useState(false);
  const [showTsv, setShowTsv] = useState(false);
  const [dragY, setDragY] = useState(0);
  const touchStartY = useRef(null);
  const sheetRef = useRef(null);

  const missing = LTA_FIELDS.filter(f => f.key && !n[f.key]).length;

  function save() {
    onColZSave(n.id, colZ);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  function onTouchStart(e) {
    touchStartY.current = e.touches[0].clientY;
    setDragY(0);
  }
  function onTouchMove(e) {
    const dy = e.touches[0].clientY - touchStartY.current;
    if (dy > 0) setDragY(dy); // only allow dragging down
  }
  function onTouchEnd() {
    if (dragY > 80) {
      onClose(); // swipe threshold: 80px down
    } else {
      setDragY(0); // snap back
    }
    touchStartY.current = null;
  }

  // Bottom sheet: full-width overlay from bottom, scrollable inside
  return (
    <div style={{
      position:"fixed", inset:0, zIndex:200,
      background:"rgba(0,0,0,0.45)",
      display:"flex", flexDirection:"column", justifyContent:"flex-end",
    }} onClick={onClose}>
      {showTsv && <TsvModal tsv={toTSV(n)} onClose={() => setShowTsv(false)} />}

      <div
        ref={sheetRef}
        onClick={e => e.stopPropagation()}
        style={{
          background:T.bg, borderRadius:"18px 18px 0 0",
          maxHeight:"88vh", display:"flex", flexDirection:"column",
          boxShadow:"0 -4px 30px rgba(0,0,0,0.18)",
          transform: `translateY(${dragY}px)`,
          transition: dragY === 0 ? "transform 0.22s ease" : "none",
        }}
      >
        {/* drag handle — touch this area to swipe down */}
        <div
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
          style={{ display:"flex", justifyContent:"center", alignItems:"center", padding:"12px 0 6px", cursor:"grab", touchAction:"none" }}
        >
          <div style={{ width:40, height:5, borderRadius:3, background:T.borderMd }} />
        </div>

        {/* sticky header — always visible */}
        <div style={{ padding:"0 16px 12px", flexShrink:0, background:ec.light, borderBottom:`1px solid ${ec.dot}33` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div style={{ display:"flex", gap:7, flexWrap:"wrap", alignItems:"center" }}>
              <span style={{ fontSize:10, fontWeight:800, padding:"3px 10px", borderRadius:5, background:T.surface, color:ec.color, letterSpacing:"0.07em", border:`1px solid ${ec.dot}55` }}>{ec.label}</span>
              <span style={{ fontSize:10, fontWeight:800, padding:"3px 10px", borderRadius:5, background:sc.light, color:sc.color, letterSpacing:"0.06em", border:`1px solid ${sc.border}` }}>{sc.icon} {sc.label}</span>
              {missing > 0 && <span style={{ fontSize:10, fontWeight:700, color:"#b91c1c" }}>⚠ {missing} missing</span>}
              {isSuspicious(n) && <span style={{ fontSize:10, fontWeight:800, padding:"2px 8px", borderRadius:12, background:"#fffbeb", color:"#b45309", border:"1px solid #fcd34d" }}>⚠️ Suspicious Activity</span>}
            </div>
            <button onClick={onClose} style={{ background:"none", border:"none", color:T.textSm, fontSize:22, cursor:"pointer", lineHeight:1, padding:"0 4px" }}>×</button>
          </div>
          <div style={{ marginTop:8, display:"flex", alignItems:"baseline", gap:10 }}>
            <div style={{ fontFamily:"monospace", fontSize:20, fontWeight:800, color:T.text }}>{n.vehicleNo}</div>
            <div style={{ fontSize:11, color:T.textSm, fontFamily:"monospace" }}>{n.noticeNo}</div>
          </div>
          {n.courtDate && (
            <div style={{ marginTop:6, fontSize:11, fontWeight:700, color:"#6d28d9", padding:"4px 10px", background:"#ede9fe", borderRadius:6, display:"inline-block", border:"1px solid #c4b5fd" }}>
              🏛 Court: {n.courtDate}
            </div>
          )}
        </div>

        {/* Col Z — pinned just below header, always visible */}
        <div style={{ padding:"10px 16px", background:T.surface, borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
          <div style={{ fontSize:10, fontWeight:700, color:T.textXs, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:5 }}>
            LTA Response No. (Col Z)
          </div>
          {n.colZ && (
            <div style={{ fontSize:11, color:"#15803d", marginBottom:6, fontWeight:600, fontFamily:"monospace",
              background:"#f0fdf4", padding:"5px 10px", borderRadius:6, border:"1px solid #86efac", wordBreak:"break-all" }}>
              ✓ {n.colZ}
            </div>
          )}
          <div style={{ display:"flex", gap:8 }}>
            <input value={colZ} onChange={e => setColZ(e.target.value)} placeholder="Paste LTA response number..."
              style={{ flex:1, padding:"9px 12px", borderRadius:7, fontSize:12, background:T.bg, border:`1.5px solid ${T.borderMd}`, color:T.text, outline:"none", fontFamily:"monospace" }} />
            <button onClick={save} style={{
              padding:"9px 16px", borderRadius:7, fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap",
              background: saved ? "#dcfce7" : ec.light, color: saved ? "#15803d" : ec.color,
              border:`1.5px solid ${saved ? "#86efac" : ec.dot+"66"}`,
            }}>{saved ? "✓ Saved" : "Save"}</button>
          </div>
        </div>

        {/* scrollable body */}
        <div style={{ flex:1, overflowY:"auto", padding:"12px 16px", display:"flex", flexDirection:"column", gap:8 }}>



          {/* LTA fields */}
          <div style={{ fontSize:10, color:T.textXs, fontWeight:700, letterSpacing:"0.07em", textTransform:"uppercase", marginTop:4, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span>Fields in LTA Form Order</span>
            <span style={{ fontSize:9, color:T.textXs, fontWeight:500, letterSpacing:"0.03em", textTransform:"none" }}>🖱 Drag any value into LTA form</span>
          </div>
          {LTA_FIELDS.filter((f,i) => i < 14).map((f, i) => {
            const val = f.key ? n[f.key] : "";
            const empty = !val;
            const [dragging, setDragging] = useState(false);
            return (
              <div key={i} style={{
                display:"flex", alignItems:"center", gap:10, padding:"8px 12px",
                borderRadius:8, background: empty ? "#fef2f2" : dragging ? ec.light : T.surface,
                border:`1px solid ${empty ? "#fca5a5" : dragging ? ec.dot+"88" : T.border}`,
                transition:"all 0.1s",
              }}>
                <div style={{ width:22, height:22, borderRadius:5, background: empty ? "#fca5a5" : ec.light, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <span style={{ fontSize:9, fontWeight:800, color: empty ? "#b91c1c" : ec.color }}>{i+1}</span>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:9, fontWeight:700, color:T.textXs, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:1 }}>{f.label}</div>
                  {empty
                    ? <div style={{ fontSize:13, fontWeight:600, color:"#b91c1c" }}>— Missing —</div>
                    : <div
                        draggable
                        onDragStart={e => { e.dataTransfer.setData("text/plain", val); setDragging(true); }}
                        onDragEnd={() => setDragging(false)}
                        style={{
                          fontSize:13, fontWeight:600, color:T.text, wordBreak:"break-word",
                          cursor:"grab", userSelect:"none",
                          padding:"3px 8px", borderRadius:5,
                          background: dragging ? ec.light : "#f8fafc",
                          border:`1px dashed ${dragging ? ec.dot : T.borderMd}`,
                          display:"inline-block",
                        }}
                        title="Drag into LTA form field"
                      >{val}</div>
                  }
                </div>
              </div>
            );
          })}
          <div style={{ height:20 }} /> {/* bottom breathing room */}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
function LTADashboard() {
  const [entity,      setEntity]      = useState("ALL");
  const [statusTab,   setStatusTab]   = useState("ALL");
  const [search,      setSearch]      = useState("");
  const [sortBy,      setSortBy]      = useState("offenceDate");
  const [selected,    setSelected]    = useState(null);
  const [notices,     setNotices]     = useState(ALL_NOTICES);
  const [showArchive, setShowArchive] = useState(false);
  const [filterVehicle,  setFilterVehicle]  = useState("");
  const [filterName,     setFilterName]     = useState("");
  const [filterLocation, setFilterLocation] = useState("");

  const entityNotices = useMemo(() =>
    entity === "ALL" ? notices : notices.filter(n => n.entity === entity),
  [notices, entity]);

  const counts = useMemo(() => ({
    total:      entityNotices.length,
    court:      entityNotices.filter(n => n.status === "court").length,
    expired:    entityNotices.filter(n => n.status === "expired").length,
    pending:    entityNotices.filter(n => n.status === "pending").length,
    furnished:  entityNotices.filter(n => n.status === "furnished").length,
    suspicious: entityNotices.filter(n => isSuspicious(n)).length,
  }), [entityNotices]);

  // Dropdown options — unique sorted values from current entity pool
  const vehicleOptions  = useMemo(() => [...new Set(entityNotices.map(n => n.vehicleNo))].sort(), [entityNotices]);
  const nameOptions     = useMemo(() => [...new Set(entityNotices.map(n => n.riderName).filter(n => n && n !== "Not Found"))].sort(), [entityNotices]);
  const locationOptions = useMemo(() => [...new Set(entityNotices.map(n => n.offenceLocation || "").filter(Boolean))].sort(), [entityNotices]);

  // Archive = full 2026 record (all notices); Active = non-furnished only
  const pool = showArchive
    ? entityNotices
    : entityNotices.filter(n => n.status !== "furnished");

  const filtered = useMemo(() => {
    let res = pool.filter(n => {
      if (!showArchive && statusTab === "suspicious") return isSuspicious(n);
      if (!showArchive && statusTab !== "ALL" && n.status !== statusTab) return false;
      if (filterVehicle  && n.vehicleNo !== filterVehicle) return false;
      if (filterName     && n.riderName !== filterName)    return false;
      if (filterLocation && (n.offenceLocation || "") !== filterLocation) return false;
      if (search) {
        const q = search.toLowerCase();
        return n.noticeNo.toLowerCase().includes(q) || n.nric.toLowerCase().includes(q) ||
               n.vehicleNo.toLowerCase().includes(q) || n.riderName.toLowerCase().includes(q);
      }
      return true;
    });
    res.sort((a, b) => {
      const oa = STATUS_ORDER.indexOf(a.status), ob = STATUS_ORDER.indexOf(b.status);
      if (oa !== ob) return oa - ob;
      const toTs = s => { const [d,m,y] = s.split("/"); return new Date(`${y}-${m}-${d}`); };
      if (sortBy === "scanDate") return toTs(a.scanDate) - toTs(b.scanDate);
      return toTs(a.offenceDate) - toTs(b.offenceDate);
    });
    return res;
  }, [pool, statusTab, search, sortBy, showArchive, filterVehicle, filterName, filterLocation]);

  function handleColZSave(id, colZ) {
    setNotices(prev => prev.map(n => n.id === id ? { ...n, colZ, status: colZ ? "furnished" : n.status } : n));
    if (selected?.id === id) setSelected(p => ({ ...p, colZ, status: colZ ? "furnished" : p.status }));
  }

  function handleEntityChange(e) {
    setEntity(e); setStatusTab("ALL"); setSelected(null); setShowArchive(false);
    setFilterVehicle(""); setFilterName(""); setFilterLocation(""); setSearch("");
  }

  const entityList = ["ALL","FBX","EKO","MOTO","EUQPL"];
  const statusTabs = ["ALL","court","expired","pending","suspicious"];
  const activeLabel = entity === "ALL" ? "All Entities" : ENTITY_CFG[entity]?.label;

  return (
    <div style={{ minHeight:"100vh", background:T.bg, color:T.text, fontFamily:"'DM Sans','Segoe UI',sans-serif", display:"flex", flexDirection:"column" }}>

      <div style={{ padding:"14px 20px 0", background:T.surface, borderBottom:`1px solid ${T.border}`, flexShrink:0, boxShadow:"0 1px 3px #0000000a" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, flexWrap:"wrap", marginBottom:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:8, background:"#0369a1", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <span style={{ fontSize:16 }}>🚦</span>
            </div>
            <div>
              <div style={{ fontSize:15, fontWeight:800, letterSpacing:"-0.02em", color:T.text }}>FBX · LTA Fines</div>
              <div style={{ fontSize:10, color:T.textXs, letterSpacing:"0.05em" }}>FURNISHING OF RIDER PARTICULARS</div>
            </div>
          </div>
          <button onClick={() => { setShowArchive(v => !v); setSelected(null); }} style={{
            fontSize:11, fontWeight:700, padding:"7px 16px", borderRadius:8, cursor:"pointer",
            background: showArchive ? "#dcfce7" : T.bg, color: showArchive ? "#15803d" : T.textMd,
            border:`1.5px solid ${showArchive ? "#86efac" : T.borderMd}`,
          }}>{showArchive ? "← Active Notices" : "📋 2026 Full Record"}</button>
        </div>

        {/* entity pills */}
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 }}>
          {entityList.map(e => (
            <EntityPill key={e} id={e} label={e === "ALL" ? "ALL" : ENTITY_CFG[e].label}
              active={entity === e} cfg={e !== "ALL" ? ENTITY_CFG[e] : null} onClick={() => handleEntityChange(e)} />
          ))}
        </div>

        {/* stat cards */}
        <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
          <StatCard label="TOTAL"      value={counts.total}      color="#374151" light="#f8fafc" border="#e2e7ef" active={false} onClick={() => {}} />
          <StatCard label="COURT"      value={counts.court}      color="#6d28d9" light="#ede9fe" border="#c4b5fd" active={!showArchive && statusTab==="court"}      onClick={() => { setShowArchive(false); setStatusTab("court"); }} />
          <StatCard label="EXPIRED"    value={counts.expired}    color="#b91c1c" light="#fef2f2" border="#fca5a5" active={!showArchive && statusTab==="expired"}    onClick={() => { setShowArchive(false); setStatusTab("expired"); }} />
          <StatCard label="PENDING"    value={counts.pending}    color="#92400e" light="#fefce8" border="#fde68a" active={!showArchive && statusTab==="pending"}    onClick={() => { setShowArchive(false); setStatusTab("pending"); }} />
          <StatCard label="FURNISHED"  value={counts.furnished}  color="#14532d" light="#f0fdf4" border="#86efac" active={showArchive}                              onClick={() => { setShowArchive(true); setSelected(null); }} />
          <StatCard label="⚠️ SUSPICIOUS" value={counts.suspicious} color="#b45309" light="#fffbeb" border="#fcd34d" active={!showArchive && statusTab==="suspicious"} onClick={() => { setShowArchive(false); setStatusTab("suspicious"); }} />
        </div>

        {/* sort + filter row */}
        <div style={{ display:"flex", flexDirection:"column", gap:8, paddingBottom:14 }}>

          {/* row 1: text search + sort */}
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="🔍  Notice no., NRIC..."
              style={{ flex:1, padding:"9px 12px", borderRadius:8, fontSize:12, background:T.bg, border:`1.5px solid ${T.borderMd}`, color:T.text, outline:"none" }}
            />
            <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ padding:"9px 10px", borderRadius:8, fontSize:11, fontWeight:700, background:T.bg, border:`1.5px solid ${T.borderMd}`, color:T.textMd, outline:"none", cursor:"pointer", flexShrink:0 }}>
              <option value="offenceDate">↕ Offence Date</option>
              <option value="scanDate">↕ Scan Date</option>
            </select>
          </div>

          {/* row 2: filter dropdowns */}
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {/* Vehicle No filter */}
            <select value={filterVehicle} onChange={e => setFilterVehicle(e.target.value)}
              style={{ flex:"1 1 120px", padding:"8px 10px", borderRadius:8, fontSize:11, fontWeight:600, background: filterVehicle ? "#eff6ff" : T.bg, border:`1.5px solid ${filterVehicle ? "#3b82f6" : T.borderMd}`, color: filterVehicle ? "#1d4ed8" : T.textMd, outline:"none", cursor:"pointer" }}>
              <option value="">🚗 Vehicle No.</option>
              {vehicleOptions.map(v => <option key={v} value={v}>{v}</option>)}
            </select>

            {/* Name filter */}
            <select value={filterName} onChange={e => setFilterName(e.target.value)}
              style={{ flex:"1 1 140px", padding:"8px 10px", borderRadius:8, fontSize:11, fontWeight:600, background: filterName ? "#eff6ff" : T.bg, border:`1.5px solid ${filterName ? "#3b82f6" : T.borderMd}`, color: filterName ? "#1d4ed8" : T.textMd, outline:"none", cursor:"pointer" }}>
              <option value="">👤 Rider Name</option>
              {nameOptions.map(n => <option key={n} value={n}>{n}</option>)}
            </select>

            {/* Location of Offence filter */}
            <select value={filterLocation} onChange={e => setFilterLocation(e.target.value)}
              style={{ flex:"1 1 150px", padding:"8px 10px", borderRadius:8, fontSize:11, fontWeight:600, background: filterLocation ? "#eff6ff" : T.bg, border:`1.5px solid ${filterLocation ? "#3b82f6" : T.borderMd}`, color: filterLocation ? "#1d4ed8" : "#9ca3af", outline:"none", cursor: locationOptions.length ? "pointer" : "default", opacity: locationOptions.length ? 1 : 0.7 }}>
              <option value="">📍 Offence Location</option>
              {locationOptions.length === 0
                ? <option disabled value="">— Coming soon —</option>
                : locationOptions.map(l => <option key={l} value={l}>{l}</option>)
              }
            </select>

            {/* Clear filters */}
            {(filterVehicle || filterName || filterLocation || search) && (
              <button onClick={() => { setFilterVehicle(""); setFilterName(""); setFilterLocation(""); setSearch(""); }}
                style={{ padding:"8px 12px", borderRadius:8, fontSize:11, fontWeight:700, cursor:"pointer", background:"#fef2f2", color:"#b91c1c", border:"1.5px solid #fca5a5", flexShrink:0 }}>
                ✕ Clear
              </button>
            )}
          </div>
        </div>

        {/* status tabs */}
        {!showArchive && (
          <div style={{ display:"flex", gap:2 }}>
            {statusTabs.map(s => {
              const cfg = s !== "ALL" ? STATUS_CFG[s] : null;
              const active = statusTab === s;
              const cnt = s === "ALL" ? pool.length : counts[s];
              return (
                <button key={s} onClick={() => setStatusTab(s)} style={{
                  fontSize:11, fontWeight:700, padding:"8px 13px 9px", cursor:"pointer",
                  background:"transparent", border:"none",
                  color: active ? (cfg ? cfg.color : T.textMd) : T.textXs,
                  borderBottom: active ? `2.5px solid ${cfg ? cfg.color : T.textMd}` : "2.5px solid transparent",
                  transition:"all 0.12s", letterSpacing:"0.04em",
                }}>
                  {s === "ALL" ? "ALL ACTIVE" : `${STATUS_CFG[s].icon} ${STATUS_CFG[s].label}`}
                  <span style={{ marginLeft:5, fontSize:10, fontWeight:600, padding:"1px 6px", borderRadius:10, background: active && cfg ? cfg.light : T.bg, color: active && cfg ? cfg.color : T.textXs }}>
                    {cnt}
                  </span>
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* body */}
      <div style={{ flex:1, display:"flex", overflow:"hidden", height:0 }}>
        <div style={{ width:"100%", display:"flex", flexDirection:"column" }}>
          {showArchive && (
            <div style={{ padding:"10px 20px 6px", fontSize:11, fontWeight:700, color:"#15803d", letterSpacing:"0.05em", flexShrink:0 }}>
              ✅ 2026 FULL RECORD — {activeLabel} · {pool.length} notices
            </div>
          )}
          <div style={{ flex:1, overflowY:"auto", padding:"10px 16px", display:"flex", flexDirection:"column", gap:6 }}>
            {filtered.length === 0
              ? <div style={{ textAlign:"center", paddingTop:60, color:T.textXs, fontSize:13 }}>No notices match this filter</div>
              : filtered.map(n => <NoticeRow key={n.id} n={n} onClick={setSelected} selected={selected?.id === n.id} />)
            }
          </div>
          <div style={{ padding:"8px 20px", borderTop:`1px solid ${T.border}`, fontSize:10, color:T.textXs, background:T.surface, flexShrink:0 }}>
            {filtered.length} of {pool.length} · {activeLabel} · sorted by {sortBy === "scanDate" ? "scan date" : "offence date"}
          </div>
        </div>

        {selected && (
          <DetailPanel n={selected} onClose={() => setSelected(null)} onColZSave={handleColZSave} />
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LTADashboard />);
  </script>
</body>
</html>
